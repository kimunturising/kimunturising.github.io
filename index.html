<style>

  .nav-links { display: flex; gap: 2.2rem; list-style: none; }

  .hero {

    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 25% 50%, rgba(255,168,0,0.22) 0%, transparent 55%),

    background:

  .hero-photo {

  .hero-photo img {

    transition: transform 7s ease;

  .hero-photo-label {
    position: absolute; bottom: 1.5rem; right: 1.5rem; z-index: 4;

    border: 1px solid rgba(255,168,0,0.3);
  }

  .hero-content {
    position: relative; z-index: 2;
    padding: 8rem 0 6rem;
    animation: fadeUp 1s ease both;
  }
  .hero-badge {
    display: inline-block;
    background: rgba(232,82,10,0.15);
    border: 1px solid var(--orange);
    color: var(--amber-light);
    font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase;

  }

  .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn-primary {
    display: inline-block; padding: 0.85rem 2.2rem;
    background: var(--amber); color: var(--navy-dark); font-weight: 700;
    border-radius: 50px; text-decoration: none; font-size: 0.95rem;
    transition: all 0.25s; letter-spacing: 0.02em;
